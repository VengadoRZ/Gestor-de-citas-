{% block content %}
<main class="container">
    <div class="card">
        
        <h2 style="color: #2c3e50;">¡Correo enviado!</h2>
        
        <hr> <p style="font-size: 1.1em; margin: 20px 0;">
            Te hemos enviado un correo con las instrucciones para restablecer la contraseña. 
        </p>
        
        <p style="color: #666; background-color: #f8f9fa; padding: 15px; border-radius: 8px;">
            <strong>Nota:</strong> Si no lo recibes en unos minutos, por favor revisa tu carpeta de <b>spam</b> o correo no deseado.
        </p>

        <div style="margin-top: 30px; text-align: center;">
            <a href="{% url 'login' %}" class="boton" style="text-decoration: none; display: inline-block;">
                Volver al inicio
            </a>
        </div>

    </div>
</main>
{% endblock %}
