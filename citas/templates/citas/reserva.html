

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Confirmar Cita</h3>
        </div>
        <div class="card-body">
            <h4>Servicio: <strong>{{ servicio.nombre }}</strong></h4>
            <p>Empresa: {{ servicio.empresa.nombre_negocio }}</p>
            <p>Precio: ${{ servicio.precio }}</p>
            <hr>
            
            <form method="POST">
                {% csrf_token %}
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                
                <div class="mb-3">
                    <label for="fecha_hora" class="form-label">Selecciona Fecha y Hora:</label>
                    <input type="datetime-local" name="fecha_hora" id="fecha_hora" class="form-control" required>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Confirmar Reservación</button>
                    <a href="{% url 'catalogo_servicios' %}" class="btn btn-outline-secondary">Volver al catálogo</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
