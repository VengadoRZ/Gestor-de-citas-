{% extends 'citas/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Completa tu perfil de Cliente</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="cedula" class="form-label">Cédula de Identidad</label>
                        <input type="text" id="cedula" name="cedula" class="form-control" placeholder="Ej: 12345678" required>
                    </div>
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono de Contacto</label>
                        <input type="text" id="telefono" name="telefono" class="form-control" placeholder="Ej: 0412-0000000" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Guardar y continuar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
